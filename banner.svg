<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8845c"/>
      <stop offset="100%" stop-color="#d4734b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Terminal window chrome -->
  <rect x="40" y="30" width="1120" height="340" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="1120" height="36" rx="10" fill="#161b22"/>
  <rect x="40" y="56" width="1120" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="68" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="88" cy="48" r="6" fill="#febc2e"/>
  <circle cx="108" cy="48" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="600" y="53" text-anchor="middle" fill="#8b949e" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" font-weight="500">Terminal — build-with-claude</text>

  <!-- Prompt line 1 -->
  <text x="70" y="105" fill="#8b949e" font-family="SF Mono, Menlo, Monaco, monospace" font-size="14">$</text>
  <text x="90" y="105" fill="#c9d1d9" font-family="SF Mono, Menlo, Monaco, monospace" font-size="14">bash &lt;(curl -fsSL setup.sh)</text>

  <!-- Big title: BUILD WITH CLAUDE -->
  <!-- Row 1: BUILD WITH -->
  <text x="100" y="190" fill="url(#accent)" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="72" font-weight="900" letter-spacing="6">BUILD WITH</text>

  <!-- Row 2: CLAUDE CODE -->
  <text x="100" y="270" fill="url(#accent)" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="72" font-weight="900" letter-spacing="6">CLAUDE CODE</text>

  <!-- Cursor block after CLAUDE CODE -->
  <rect x="830" y="242" width="42" height="36" fill="#e8845c" opacity="0.7" rx="2">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="100" y="320" fill="#8b949e" font-family="SF Mono, Menlo, Monaco, monospace" font-size="18">Build apps from your phone. No coding experience needed.</text>

  <!-- Flow diagram -->
  <g transform="translate(100, 345)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle" fill="#e8845c" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="600">📱 Phone</text>

    <text x="115" y="17" fill="#4b5563" font-family="SF Mono, monospace" font-size="14">→</text>

    <rect x="130" y="0" width="120" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="190" y="17" text-anchor="middle" fill="#7c5ce0" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="600">🤖 Claude</text>

    <text x="265" y="17" fill="#4b5563" font-family="SF Mono, monospace" font-size="14">→</text>

    <rect x="280" y="0" width="110" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="335" y="17" text-anchor="middle" fill="#28c840" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="600">🌐 Live App</text>
  </g>

  <!-- Stars decoration -->
  <text x="1050" y="110" fill="#e8845c" opacity="0.3" font-size="20">✦</text>
  <text x="1090" y="145" fill="#d4734b" opacity="0.2" font-size="14">✦</text>
  <text x="1070" y="180" fill="#e8845c" opacity="0.15" font-size="28">✦</text>
  <text x="1100" y="260" fill="#d4734b" opacity="0.25" font-size="16">✦</text>
  <text x="1060" y="300" fill="#e8845c" opacity="0.2" font-size="12">✦</text>
</svg>
